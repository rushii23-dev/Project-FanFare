# Weekly dependency-update PRs, so security patches land without anyone
# having to remember to check. CI (lint, coverage-gated tests, bundle secret
# scan, a11y gate) decides whether each bump is safe to merge.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
