# Weekly dependency-update PRs, so security patches land without anyone
# having to remember to check. CI (lint, coverage-gated tests, bundle secret
# scan, a11y gate) decides whether each bump is safe to merge.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # Major bumps (react 19, vite 8, ...) are deliberate migrations, not
      # routine patches — take them manually, not via auto-PR.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
