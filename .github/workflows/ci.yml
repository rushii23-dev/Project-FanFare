name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: No secrets in the bundle
        run: |
          if grep -rE "(AQ\.[A-Za-z0-9_.-]{20,}|AIza[A-Za-z0-9_-]{30,})" dist/; then
            echo "::error::A credential-shaped string leaked into the client bundle"
            exit 1
          fi
          echo "Bundle is clean."

      # Version must match the pinned playwright-core so the browser
      # revision it downloads is the one playwright-core expects.
      - name: Install Chromium for the accessibility gate
        run: npx playwright@1.49.1 install --with-deps chromium

      - name: Accessibility gate (axe, WCAG 2.1 A/AA, every core screen)
        run: npm run test:a11y
