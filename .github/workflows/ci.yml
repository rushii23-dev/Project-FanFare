name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (correctness + static accessibility rules)
        run: npm run lint

      - name: Type check (strict checkJs over the logic layer)
        run: npm run typecheck

      - name: Known-vulnerability audit
        run: npm audit --audit-level=high

      - name: Test with enforced coverage thresholds
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: No secrets in the bundle
        run: |
          if grep -rE "(AQ\.[A-Za-z0-9_.-]{20,}|AIza[A-Za-z0-9_-]{30,})" dist/; then
            echo "::error::A credential-shaped string leaked into the client bundle"
            exit 1
          fi
          echo "Bundle is clean."

      # Version must match the pinned playwright-core so the browser
      # revision it downloads is the one playwright-core expects.
      - name: Install Chromium for the accessibility gate
        run: npx playwright@1.61.1 install --with-deps chromium

      - name: Accessibility gate (axe, WCAG 2.1 A/AA + 2.2 AA, every screen)
        run: npm run test:a11y
